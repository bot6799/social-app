---
name: Build and Submit iOS

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: Build profile to use
        options:
          - testflight
          - production

jobs:
  build:
    name: Build and Submit iOS
    runs-on: macos-14-xlarge
    concurrency:
      group: ios-build
      cancel-in-progress: false
    steps:
      - name: Check for EXPO_TOKEN
        run: >
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to this project's Expo account in this repo's secrets. Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Setup jq
        uses: dcarbone/install-jq-action@v2

      - name: Setup EAS
        uses: expo/expo-github-action@main
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup EAS local builds
        run: yarn global add eas-cli-local-build-plugin

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Cocoapods
        uses: maxim-lobanov/setup-cocoapods@v1
        with:
          version: 1.16.2

      - name: Cache Pods
        uses: actions/cache@v4
        id: pods-cache
        with:
          path: ./ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('yarn.lock') }}

      - name: Compile translations
        run: yarn intl:build 2>&1 | tee i18n.log

      - name: Check for i18n compilation errors
        run: if grep -q "invalid syntax" "i18n.log"; then echo "Found compilation errors!" && exit 1; else echo "No compilation errors"; fi

      - name: Write environment variables
        id: env
        run: |
          echo "EXPO_PUBLIC_ENV=${{ inputs.profile || 'testflight' }}" > .env
          echo "EXPO_PUBLIC_RELEASE_VERSION=$(jq -r '.version' package.json)" >> .env
          echo "EXPO_PUBLIC_RELEASE_VERSION=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT
          echo "EXPO_PUBLIC_BUNDLE_IDENTIFIER=$(git rev-parse HEAD)" >> .env
          echo "EXPO_PUBLIC_BUNDLE_IDENTIFIER=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "EXPO_PUBLIC_BUNDLE_DATE=$(date -u +"%y%m%d%H")" >> .env

      - name: EAS Build
        env:
          PROFILE: ${{ inputs.profile || 'testflight' }}
        run: >
          yarn use-build-number-with-bump
          eas build -p ios
          --profile $PROFILE
          --local --output build.tar.gz --non-interactive

      - name: Extract build artifact
        run: |
          if [ -f "build.tar.gz" ]; then
            echo "Extracting build.tar.gz..."
            mkdir ios-build
            tar -xzf build.tar.gz -C ios-build
            echo "Extraction completed successfully"
          else
            echo "Archive file not found!"
            exit 1
          fi

      - name: Find IPA file
        id: find-ipa
        run: |
          IPA_PATH=$(find ios-build -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA file found!"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> $GITHUB_OUTPUT
          echo "Found IPA: $IPA_PATH"

      - name: Submit to TestFlight
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: >
          eas submit -p ios
          --non-interactive
          --path ${{ steps.find-ipa.outputs.IPA_PATH }}
          --profile ${{ inputs.profile || 'testflight' }}

      - name: Get version from package.json
        id: get-build-info
        run: |
          echo "PACKAGE_VERSION=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Restore Cache
        id: get-base-commit
        uses: actions/cache@v4
        if: ${{ inputs.profile == 'testflight' }}
        with:
          path: most-recent-testflight-commit.txt
          key: most-recent-testflight-commit

      - name: Write commit hash to cache
        env:
          GITHUB_SHA: ${{ github.sha }}
        if: ${{ inputs.profile == 'testflight' }}
        run: echo $GITHUB_SHA > most-recent-testflight-commit.txt
